{% extends 'base.html' %}

{% block content %}
<div class="card" style="max-width: 500px; margin: 0 auto;">
    <div class="card-header">Student Registration</div>
    <form method="POST" action="{{ url_for('register_student') }}">
        <div class="form-group">
            <label for="name">Full Name</label>
            <input type="text" id="name" name="name" class="form-control" required>
        </div>
        <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" name="email" class="form-control" required>
        </div>
        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" class="form-control" required>
        </div>
        <div class="form-group">
            <label for="teacher_id">Select Teacher / Class</label>
            <select id="teacher_id" name="teacher_id" class="form-control" required>
                <option value="" disabled selected>Select your teacher</option>
                {% for teacher in teachers %}
                <option value="{{ teacher.teacher_id }}">{{ teacher.name }}</option>
                {% endfor %}
            </select>
        </div>
        <button type="submit" class="btn btn-primary">Register</button>
    </form>
    <p style="margin-top: 1rem; text-align: center;">Already have an account? <a href="{{ url_for('login_student') }}">Login here</a></p>
</div>
{% endblock %}
